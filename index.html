                                <p class="text-[10px] font-bold text-slate-400 mt-1 italic">Arrivée : 4 min</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-slate-200"></i>
                    </div>

                content.innerHTML = `
                    <div class="bg-orange-50 p-6 rounded-[2.5rem] border border-orange-100 shadow-sm">

                                <span class="text-[9px] font-black">24</span>
                            </div>
                        </div>
                    </div>
                `;
            } else if(page === 'gaba') {
                content.innerHTML = `
                    <div class="sotra-vert text-white p-10 rounded-[3rem] shadow-2xl text-center border-b-[10px] border-black/10">
                        <p class="text-[10px] font-black uppercase opacity-60 mb-2">Mon Gaba Sécurisé</p>
                        <h2 class="text-6xl font-black italic tracking-tighter mb-8 text-white">1 500 <span class="text-xl font-normal">F</span></h2>
                        <div class="space-y-3">
                            <button class="w-full bg-white text-[#009E49] py-4 rounded-2xl font-black uppercase italic text-xs shadow-xl">Épargner</button>
                            <button class="w-full bg-black/20 border border-white/30 py-4 rounded-2xl font-black uppercase italic text-xs flex items-center justify-center gap-2">
                                <i class="fas fa-qrcode"></i> Scanner ticket
                            </button>
                        </div>
                    </div>
                    <div class="bg-[#47C1FF] rounded-[2.5rem] p-6 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <p class="text-[8px] font-black uppercase opacity-60">Partenaire</p>
                            <h4 class="font-black italic uppercase text-2xl">Wave CI</h4>
                        </div>
                        <i class="fas fa-wallet text-3xl opacity-30"></i>
                    </div>
                `;
            }
        }
        showPage('trajets');
    </script>
