<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonBus CI - Demo Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes scan-line {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: #f97316;
            box-shadow: 0 0 15px #f97316;
            animation: scan-line 2s linear infinite;
        }
        .custom-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Bus, Wallet, Lock, CheckCircle, Send, 
            MessageSquare, ChevronRight, ChevronLeft, 
            ScanLine, Camera, Star, Info 
        } = lucide;

        const App = () => {
            const [view, setView] = useState('lines');
            const [balance, setBalance] = useState(4350);
            const [busPoints, setBusPoints] = useState(1250);
            const [selectedLine, setSelectedLine] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [paymentStep, setPaymentStep] = useState('idle');
            const [newComment, setNewComment] = useState("");
            const [comments, setComments] = useState([
                { id: 1, user: "Koffi J.", text: "Le 210 arrive à Riviera 2 !", time: "1m" },
                { id: 2, user: "Sali T.", text: "Embouteillage à l'Indénié, évitez !", time: "4m" }
            ]);

            const BUS_LINES = [
                { id: '11', name: 'Gare Sud - Adjamé Liberté', color: 'bg-green-600', price: 200, stops: ["Gare Sud", "Indénié", "Liberté"] },
                { id: '210', name: 'Gare St-Jean - Riviera 3', color: 'bg-orange-600', price: 500, stops: ["Gare St-Jean", "Riviera 2", "Riviera 3"] },
                { id: '04', name: 'Gare Sud - Koumassi', color: 'bg-blue-600', price: 200, stops: ["Gare Sud", "Treichville", "Koumassi"] }
            ];

            const handleSendComment = () => {
                if (!newComment.trim()) return;
                const msg = { 
                    id: Date.now(), 
                    user: "Moi", 
                    text: newComment, 
                    time: "Maintenant" 
                };
                setComments([msg, ...comments]);
                setNewComment("");
                setBusPoints(prev => prev + 15);
            };

            const startScan = () => {
                setPaymentStep('scanning');
                setTimeout(() => {
                    setPaymentStep('success');
                    setBalance(prev => prev - 500);
                }, 3000);
            };

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto relative bg-white shadow-2xl">
                    {/* Drapeau Côte d'Ivoire */}
                    <div className="h-1.5 w-full flex sticky top-0 z-[60]">
                        <div className="flex-1 bg-[#FF8200]"></div>
                        <div className="flex-1 bg-white"></div>
                        <div className="flex-1 bg-[#009E49]"></div>
                    </div>

                    {/* Header */}
                    <header className="p-4 border-b border-slate-100 flex justify-between items-center sticky top-1.5 bg-white/90 backdrop-blur-md z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-orange-500 p-2 rounded-xl">
                                <Bus className="text-white w-5 h-5" />
                            </div>
                            <h1 className="font-black italic text-xl uppercase tracking-tighter">MonBus</h1>
                        </div>
                        <button onClick={() => setView('wallet')} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold">
                            {balance.toLocaleString()} F
                        </button>
                    </header>

                    <main className="flex-1 p-4 pb-32 overflow-y-auto custom-scroll">
                        {view === 'lines' && (
                            <div className="space-y-6">
                                {/* Carte Points */}
                                <div className="bg-gradient-to-br from-indigo-600 to-violet-700 rounded-[2rem] p-6 text-white shadow-lg">
                                    <p className="text-[10px] font-bold uppercase opacity-60">Récompenses Fidélité</p>
                                    <h3 className="text-3xl font-black italic">{busPoints.toLocaleString()} Pts</h3>
                                    <div className="mt-4 h-1.5 w-full bg-white/20 rounded-full overflow-hidden">
                                        <div className="h-full bg-yellow-400" style={{width: '65%'}}></div>
                                    </div>
                                </div>

                                {/* Zone Solidarité (Fonctionnelle) */}
                                <section className="bg-slate-50 p-4 rounded-[2rem] border border-slate-100">
                                    <h3 className="text-[10px] font-black uppercase text-slate-400 mb-3 flex items-center gap-2 italic">
                                        <MessageSquare className="w-3 h-3" /> Infos Trafic en Direct
                                    </h3>
                                    <div className="space-y-2 mb-4 max-h-32 overflow-y-auto custom-scroll">
                                        {comments.map(c => (
                                            <div key={c.id} className="bg-white p-3 rounded-2xl shadow-sm border border-slate-50">
                                                <div className="flex justify-between text-[8px] font-black uppercase italic mb-1">
                                                    <span className="text-orange-500">{c.user}</span>
                                                    <span className="text-slate-300">{c.time}</span>
                                                </div>
                                                <p className="text-[11px] font-bold text-slate-700">{c.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input 
                                            value={newComment}
                                            onChange={(e) => setNewComment(e.target.value)}
                                            placeholder="Un bus arrive ?" 
                                            className="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-3 text-xs font-bold outline-none focus:border-orange-500"
                                        />
                                        <button 
                                            onClick={handleSendComment}
                                            className="bg-orange-500 text-white p-3 rounded-xl disabled:opacity-50"
                                            disabled={!newComment.trim()}
                                        >
                                            <Send className="w-4 h-4" />
                                        </button>
                                    </div>
                                </section>

                                {/* Liste des lignes */}
                                <div className="space-y-3">
                                    <h3 className="text-[10px] font-black uppercase text-slate-400 px-2 italic">Réseau SOTRA</h3>
                                    {BUS_LINES.map(line => (
                                        <div 
                                            key={line.id} 
                                            onClick={() => { setSelectedLine(line); setView('details'); }}
                                            className="bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm active:scale-95 transition-transform"
                                        >
                                            <div className="flex items-center gap-4">
                                                <div className={`${line.color} text-white w-12 h-12 rounded-2xl flex items-center justify-center font-black text-lg`}>
                                                    {line.id}
                                                </div>
                                                <div>
                                                    <p className="font-black text-sm italic">{line.name.split(' - ')[0]}</p>
                                                    <p className="text-[9px] font-bold text-slate-400 uppercase italic">Ticket : {line.price} F</p>
                                                </div>
                                            </div>
                                            <ChevronRight className="text-slate-200" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'wallet' && (
                            <div className="space-y-6">
                                <div className="bg-orange-500 text-white p-8 rounded-[2.5rem] shadow-xl text-center">
                                    <p className="text-[10px] font-bold uppercase opacity-70 mb-2">Solde Disponible</p>
                                    <h2 className="text-5xl font-black italic">{balance.toLocaleString()} F</h2>
                                    <div className="flex gap-2 mt-6">
                                        <button className="flex-1 bg-white text-orange-600 py-3 rounded-2xl text-[10px] font-black uppercase">Recharger</button>
                                        <button className="flex-1 bg-orange-600 text-white py-3 rounded-2xl text-[10px] font-black uppercase border border-orange-400">Retirer</button>
                                    </div>
                                </div>

                                {/* SCANNER QR CODE */}
                                <div className="bg-white border-4 border-dashed border-orange-200 rounded-[2.5rem] p-8 text-center space-y-4">
                                    <h3 className="font-black italic text-lg uppercase leading-none">Paiement QR Code</h3>
                                    
                                    {paymentStep === 'idle' && (
                                        <button onClick={startScan} className="w-full py-8 flex flex-col items-center gap-3 active:scale-95 transition-all">
                                            <div className="bg-orange-50 p-6 rounded-full">
                                                <ScanLine className="w-10 h-10 text-orange-500" />
                                            </div>
                                            <span className="text-[10px] font-black uppercase text-orange-500 italic">Cliquer pour scanner</span>
                                        </button>
                                    )}

                                    {paymentStep === 'scanning' && (
                                        <div className="py-4 flex flex-col items-center gap-4">
                                            <div className="w-40 h-40 border-2 border-orange-500 rounded-2xl relative overflow-hidden bg-slate-900">
                                                <div className="animate-scan"></div>
                                                <Camera className="w-8 h-8 text-slate-700 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" />
                                            </div>
                                            <p className="text-[10px] font-black uppercase text-orange-500 animate-pulse italic tracking-widest">Lecture SOTRA...</p>
                                        </div>
                                    )}

                                    {paymentStep === 'success' && (
                                        <div className="py-4 space-y-4">
                                            <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto">
                                                <CheckCircle className="w-8 h-8" />
                                            </div>
                                            <p className="font-black italic text-green-600 uppercase">Ticket validé !</p>
                                            <button onClick={() => setPaymentStep('idle')} className="text-[10px] font-black uppercase text-slate-400 underline">Nouveau scan</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'budget' && (
                            <div className="space-y-6">
                                <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] relative overflow-hidden">
                                    <div className="flex items-center gap-2 mb-2 opacity-50">
                                        <Lock className="w-4 h-4" />
                                        <p className="text-[9px] font-black uppercase">Gaba Transport (Bloqué)</p>
                                    </div>
                                    <h2 className="text-5xl font-black italic">1 500 F</h2>
                                    <p className="text-[9px] font-bold text-slate-500 uppercase mt-2">Déblocage automatique le 31 Mai</p>
                                </div>
                                <div className="bg-indigo-50 p-5 rounded-3xl border border-indigo-100 flex gap-4">
                                    <Info className="w-5 h-5 text-indigo-500 shrink-0" />
                                    <p className="text-[11px] font-bold text-indigo-900 italic leading-snug">
                                        Cet argent est mis de côté uniquement pour ton transport. Pas de faim, pas de stress !
                                    </p>
                                </div>
                            </div>
                        )}

                        {view === 'details' && selectedLine && (
                            <div className="space-y-6">
                                <button onClick={() => setView('lines')} className="flex items-center gap-2 text-[10px] font-black uppercase text-slate-400">
                                    <ChevronLeft className="w-4 h-4" /> Retour
                                </button>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className={`${selectedLine.color} text-white w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg`}>
                                            {selectedLine.id}
                                        </div>
                                        <h2 className="text-lg font-black italic uppercase leading-tight">{selectedLine.name}</h2>
                                    </div>
                                    <div className="space-y-6 relative pl-6 border-l-2 border-slate-100 ml-3">
                                        {selectedLine.stops.map((stop, i) => (
                                            <div key={i} className="relative">
                                                <div className={`absolute -left-[31px] w-4 h-4 rounded-full border-2 border-white shadow-sm ${i === 0 ? 'bg-orange-500' : 'bg-slate-200'}`}></div>
                                                <p className="text-[11px] font-black uppercase italic text-slate-500">{stop}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Basse */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-xl border-t border-slate-100 px-6 py-4 flex justify-around items-end pb-8 z-[100] rounded-t-[2rem] shadow-2xl">
                        <button onClick={() => setView('lines')} className={`flex flex-col items-center gap-1 transition-all ${view === 'lines' ? 'text-orange-500 scale-110' : 'text-slate-300'}`}>
                            <Bus className="w-6 h-6" strokeWidth={3} />
                            <span className="text-[8px] font-black uppercase italic">Réseau</span>
                        </button>
                        <button onClick={() => setView('budget')} className={`flex flex-col items-center gap-1 transition-all ${view === 'budget' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
                            <Lock className="w-6 h-6" strokeWidth={3} />
                            <span className="text-[8px] font-black uppercase italic">Le Gaba</span>
                        </button>
                        <button onClick={() => setView('wallet')} className={`flex flex-col items-center gap-1 transition-all ${view === 'wallet' ? 'text-orange-500 scale-110' : 'text-slate-300'}`}>
                            <Wallet className="w-6 h-6" strokeWidth={3} />
                            <span className="text-[8px] font-black uppercase italic">Banque</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
